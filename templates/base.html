<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ site.title }}{% endblock %}">
    <meta name="author" content="{{ site.author }}">
    {% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.absolute_url }}/feed.xml">
    <link rel="stylesheet" href="{{ site.url }}/highlight.css">
    <style>
        :root {
            --bg: #fff;
            --fg: #111;
            --fg-dim: #555;
            --fg-faint: #999;
            --link: #1a0dab;
            --link-visited: #681da8;
            --border: #ddd;
            --code-bg: #f5f5f5;
            --blockquote-border: #ccc;
            --max-width: 700px;
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #1c1c1c;
                --fg: #e0e0e0;
                --fg-dim: #aaa;
                --fg-faint: #777;
                --link: #7cacf8;
                --link-visited: #c4a5de;
                --border: #333;
                --code-bg: #2a2a2a;
                --blockquote-border: #555;
            }
        }
        [data-theme="dark"] {
            --bg: #1c1c1c;
            --fg: #e0e0e0;
            --fg-dim: #aaa;
            --fg-faint: #777;
            --link: #7cacf8;
            --link-visited: #c4a5de;
            --border: #333;
            --code-bg: #2a2a2a;
            --blockquote-border: #555;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 18px;
            line-height: 1.7;
            color: var(--fg);
            background: var(--bg);
            margin: 0;
            padding: 0 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 0;
        }
        header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }
        header h1 a {
            color: var(--fg);
            text-decoration: none;
        }
        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            align-items: center;
        }
        nav a {
            color: var(--fg-dim);
            text-decoration: none;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        nav a:hover { color: var(--fg); }
        nav a.active { color: var(--fg); font-weight: 600; }
        .theme-toggle {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            color: var(--fg-dim);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .theme-toggle:hover { color: var(--fg); border-color: var(--fg-dim); }
        a { color: var(--link); }
        a:visited { color: var(--link-visited); }
        h1, h2, h3, h4 {
            font-weight: 600;
            line-height: 1.3;
            margin: 1.5em 0 0.5em;
        }
        h1 { font-size: 28px; }
        h2 { font-size: 22px; }
        h3 { font-size: 18px; }
        .post-list { list-style: none; padding: 0; }
        .post-list li {
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            align-items: baseline;
        }
        .post-date {
            color: var(--fg-faint);
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            white-space: nowrap;
            min-width: 90px;
        }
        .post-link {
            text-decoration: none;
            color: var(--fg);
        }
        .post-link:visited { color: var(--fg-dim); }
        .post-link:hover { color: var(--link); }
        article { margin-bottom: 60px; }
        article .meta {
            color: var(--fg-faint);
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            margin-bottom: 30px;
        }
        article .meta a { color: var(--fg-dim); text-decoration: none; }
        article .meta a:hover { color: var(--fg); }
        /* Images */
        article img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 1.5em 0;
            display: block;
        }
        article p > img:only-child { margin: 2em auto; }
        /* Inline code */
        code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 3px;
            word-break: break-word;
        }
        /* Code blocks */
        pre {
            background: var(--code-bg);
            padding: 16px;
            overflow-x: auto;
            border-radius: 6px;
            line-height: 1.5;
            margin: 1.5em 0;
            -webkit-overflow-scrolling: touch;
        }
        pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
            word-break: normal;
        }
        .highlight { margin: 1.5em 0; border-radius: 6px; overflow: hidden; }
        .highlight pre { margin: 0; }
        /* Blockquotes */
        blockquote {
            border-left: 3px solid var(--blockquote-border);
            margin: 1.5em 0;
            padding: 0 0 0 20px;
            color: var(--fg-dim);
        }
        blockquote p:first-child { margin-top: 0; }
        blockquote p:last-child { margin-bottom: 0; }
        hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
        /* Tables */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 1.5em 0; }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 400px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        th {
            font-weight: 600;
            background: var(--code-bg);
        }
        tr:nth-child(even) td { background: var(--code-bg); }
        /* Lists inside articles */
        article ul, article ol { padding-left: 1.5em; }
        article li { margin-bottom: 0.3em; }
        article li > p { margin: 0.3em 0; }
        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--fg-faint);
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        /* Mobile */
        @media (max-width: 600px) {
            body { font-size: 16px; padding: 0 16px; }
            .container { padding: 24px 0; }
            header { margin-bottom: 24px; }
            h1 { font-size: 24px; }
            h2 { font-size: 20px; }
            pre { padding: 12px; font-size: 14px; }
            th, td { padding: 6px 8px; font-size: 15px; }
            .post-list li { flex-direction: column; gap: 2px; }
            article img { border-radius: 2px; margin: 1em 0; }
            blockquote { padding-left: 14px; }
            nav { gap: 6px 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ site.url }}/">{{ site.title }}</a></h1>
            <nav>
                {% for cat in categories %}
                <a href="{{ site.url }}/categories/{{ cat | lower }}/"{% if active_category == cat %} class="active"{% endif %}>{{ cat }}</a>
                {% endfor %}
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">◐</button>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            <p>{{ site.author }} · <a href="{{ site.url }}/feed.xml">RSS</a>{% for page in pages %} · <a href="{{ site.url }}/{{ page.slug }}/">{{ page.title }}</a>{% endfor %}</p>
        </footer>
    </div>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : (current === 'light' ? '' : 'dark');
            if (next) {
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            } else {
                html.removeAttribute('data-theme');
                localStorage.removeItem('theme');
            }
        }
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</body>
</html>
